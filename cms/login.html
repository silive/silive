<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>非常智造管理后台登录</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f5f7;
      color: #1d1d1f;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    }
    .login {
      width: min(420px, calc(100vw - 36px));
      padding: 30px;
      border-radius: 24px;
      background: rgba(255,255,255,.86);
      border: 1px solid rgba(0,0,0,.06);
      box-shadow: 0 24px 70px rgba(0,0,0,.08);
      backdrop-filter: blur(28px);
    }
    h1 { margin: 0; font-size: 28px; letter-spacing: 0; }
    p { margin: 10px 0 26px; color: #86868b; font-size: 14px; }
    label { display: block; margin-bottom: 14px; color: #5f5753; font-size: 13px; font-weight: 800; }
    input {
      width: 100%;
      height: 46px;
      margin-top: 8px;
      padding: 0 14px;
      border: 1px solid #e6e1de;
      border-radius: 14px;
      background: #fbfbfd;
      color: #1d1d1f;
      font: inherit;
      outline: none;
    }
    button {
      width: 100%;
      height: 46px;
      margin-top: 6px;
      border: 0;
      border-radius: 999px;
      background: #1d1d1f;
      color: #fff;
      font-weight: 850;
      cursor: pointer;
    }
    .status { min-height: 20px; margin-top: 14px; color: #9b6a62; font-size: 13px; font-weight: 800; }
  </style>
</head>
<body>
  <form class="login" id="loginForm">
    <h1>非常智造管理后台</h1>
    <p>请输入管理员账号，进入后台维护内容和订单。</p>
    <label>管理员账号<input id="username" autocomplete="username" value="admin"></label>
    <label>管理员密码<input id="password" type="password" autocomplete="current-password"></label>
    <button>登录</button>
    <div class="status" id="status"></div>
  </form>
  <script>
    const form = document.getElementById("loginForm")
    const status = document.getElementById("status")
    form.addEventListener("submit", async event => {
      event.preventDefault()
      status.textContent = "正在登录..."
      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: document.getElementById("username").value,
          password: document.getElementById("password").value
        })
      })
      const data = await res.json()
      if (!data.ok) {
        status.textContent = data.message || "登录失败"
        return
      }
      location.href = "/admin"
    })
  </script>
</body>
</html>
